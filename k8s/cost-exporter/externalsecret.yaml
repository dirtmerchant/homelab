apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cost-exporter-secret
  namespace: cost-exporter
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: cost-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: hermes-briefing/credential
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: tavily/credential
