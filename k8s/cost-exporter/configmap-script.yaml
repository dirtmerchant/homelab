apiVersion: v1
kind: ConfigMap
metadata:
  name: cost-exporter-script
  namespace: cost-exporter
data:
  exporter.py: |
    """Prometheus exporter for OpenRouter and Tavily API usage metrics."""

    import json
    import os
    import threading
    import time
    import urllib.request
    from http.server import HTTPServer, BaseHTTPRequestHandler

    POLL_INTERVAL = int(os.environ.get("POLL_INTERVAL", "300"))
    OPENROUTER_API_KEY = os.environ.get("OPENROUTER_API_KEY", "")
    TAVILY_API_KEY = os.environ.get("TAVILY_API_KEY", "")

    metrics = {}
    metrics_lock = threading.Lock()


    def poll_openrouter():
        if not OPENROUTER_API_KEY:
            return
        req = urllib.request.Request(
            "https://openrouter.ai/api/v1/auth/key",
            headers={"Authorization": f"Bearer {OPENROUTER_API_KEY}"},
        )
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                data = json.loads(resp.read().decode())["data"]
            with metrics_lock:
                usage = data.get("usage") or 0
                limit = data.get("limit")
                metrics["openrouter_usage_credits_total"] = usage
                if limit is not None:
                    metrics["openrouter_limit_credits_total"] = limit
                    metrics["openrouter_limit_remaining_credits"] = max(limit - usage, 0)
        except Exception as e:
            print(f"openrouter poll error: {e}", flush=True)


    def poll_tavily():
        if not TAVILY_API_KEY:
            return
        req = urllib.request.Request(
            "https://api.tavily.com/usage",
            headers={"Authorization": f"Bearer {TAVILY_API_KEY}"},
        )
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                data = json.loads(resp.read().decode())
            with metrics_lock:
                key = data.get("key", {})
                metrics["tavily_key_usage"] = key.get("usage") or 0
                key_limit = key.get("limit")
                if key_limit is not None:
                    metrics["tavily_key_limit"] = key_limit
                metrics["tavily_key_search_usage"] = key.get("search_usage") or 0
                metrics["tavily_key_extract_usage"] = key.get("extract_usage") or 0
                account = data.get("account", {})
                metrics["tavily_account_plan_usage"] = account.get("plan_usage") or 0
                metrics["tavily_account_plan_limit"] = account.get("plan_limit") or 0
        except Exception as e:
            print(f"tavily poll error: {e}", flush=True)


    def poll_loop():
        while True:
            poll_openrouter()
            poll_tavily()
            with metrics_lock:
                metrics["cost_exporter_last_poll_timestamp"] = time.time()
            time.sleep(POLL_INTERVAL)


    class MetricsHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/metrics":
                self.send_response(404)
                self.end_headers()
                return
            with metrics_lock:
                lines = []
                for name, value in sorted(metrics.items()):
                    lines.append(f"{name} {value}")
            body = "\n".join(lines) + "\n"
            self.send_response(200)
            self.send_header("Content-Type", "text/plain; charset=utf-8")
            self.end_headers()
            self.wfile.write(body.encode())

        def log_message(self, fmt, *args):
            pass  # suppress per-request logs


    if __name__ == "__main__":
        t = threading.Thread(target=poll_loop, daemon=True)
        t.start()
        server = HTTPServer(("0.0.0.0", 9090), MetricsHandler)
        print("cost-exporter listening on :9090", flush=True)
        server.serve_forever()
