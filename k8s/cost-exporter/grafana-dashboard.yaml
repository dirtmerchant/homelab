apiVersion: v1
kind: ConfigMap
metadata:
  name: cost-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cost-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "templating": {
        "list": [
          {
            "name": "wattage",
            "type": "textbox",
            "label": "Cluster Wattage (W)",
            "current": { "value": "51" },
            "query": "51"
          },
          {
            "name": "kwh_rate",
            "type": "textbox",
            "label": "Electricity Rate ($/kWh)",
            "current": { "value": "0.11" },
            "query": "0.11"
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "OpenRouter",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "title": "Credits Used",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "openrouter_usage_credits_total",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Credit Limit",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "openrouter_limit_credits_total",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Credits Remaining",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "openrouter_limit_remaining_credits",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Usage %",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "openrouter_usage_credits_total / openrouter_limit_credits_total",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "Tavily",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "title": "Key Usage",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "tavily_key_usage",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Key Limit",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "tavily_key_limit",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Plan Usage",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "tavily_account_plan_usage",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Plan Limit",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "tavily_account_plan_limit",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Tavily Usage by Endpoint",
          "type": "bargauge",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "tavily_key_search_usage",
              "legendFormat": "Search",
              "refId": "A"
            },
            {
              "expr": "tavily_key_extract_usage",
              "legendFormat": "Extract",
              "refId": "B"
            }
          ]
        },
        {
          "type": "row",
          "title": "Electricity Estimate",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "collapsed": false
        },
        {
          "title": "Cluster Wattage",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "vector($wattage)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Monthly Electricity Cost",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "vector($wattage) / 1000 * 24 * 30.44 * $kwh_rate",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Annual Electricity Cost",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 17 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "vector($wattage) / 1000 * 8766 * $kwh_rate",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "type": "row",
          "title": "Summary",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
          "collapsed": false
        },
        {
          "title": "Total Est. Monthly Cost",
          "description": "OpenRouter usage + monthly electricity estimate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 0, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 20 },
                  { "color": "red", "value": 50 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "openrouter_usage_credits_total + (vector($wattage) / 1000 * 24 * 30.44 * $kwh_rate)",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        },
        {
          "title": "Last Poll",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "dateTimeAsIso",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "cost_exporter_last_poll_timestamp * 1000",
              "legendFormat": "",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["cost", "homelab"],
      "time": { "from": "now-6h", "to": "now" },
      "title": "Homelab Costs",
      "uid": "homelab-costs",
      "version": 1
    }
