apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-exporter
  namespace: cost-exporter
  labels:
    app: cost-exporter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cost-exporter
  template:
    metadata:
      labels:
        app: cost-exporter
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cost-exporter
          image: python:3.13-slim@sha256:eb43ff125d8d58d7449dcba7d336c23bcac412f526d861db493b9994d8010280
          command: ["python", "/app/exporter.py"]
          ports:
            - containerPort: 9090
              name: metrics
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          startupProbe:
            httpGet:
              path: /metrics
              port: 9090
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          env:
            - name: TZ
              value: America/New_York
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cost-exporter-secret
                  key: OPENROUTER_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cost-exporter-secret
                  key: TAVILY_API_KEY
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: cost-exporter-script
