image:
  tag: "v2026.7.7.2"

persistence:
  storageClass: local-path
  size: 5Gi

env:
  GATEWAY_ALLOW_ALL_USERS: "false"
  TELEGRAM_ALLOWED_USERS: "8365815206"
  HERMES_UID: "1000"
  HERMES_GID: "1000"

# The Hermes image uses s6-overlay which must start as root and internally
# drop to HERMES_UID/HERMES_GID. Override the chart's non-root defaults.
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  runAsNonRoot: false
  seccompProfile:
    type: RuntimeDefault

# s6-overlay init needs CHOWN, DAC_OVERRIDE, FOWNER for volume setup
# and SETUID/SETGID to drop to the hermes user. All allowed by baseline PSA.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
  seccompProfile:
    type: RuntimeDefault

config:
  values:
    model:
      default: anthropic/claude-opus-4.6
      provider: auto
      base_url: https://openrouter.ai/api/v1
    agent:
      max_turns: 90
      gateway_timeout: 1800
      restart_drain_timeout: 60
      tool_use_enforcement: auto
    terminal:
      backend: local
      cwd: .
      timeout: 180
    display:
      tool_progress: all
      interim_assistant_messages: true
    browser:
      inactivity_timeout: 120
      command_timeout: 30
      allow_private_urls: false
    compression:
      enabled: true
      threshold: 0.5
      target_ratio: 0.2
      protect_last_n: 20
    security:
      redact_secrets: true
      tirith_enabled: true
      tirith_fail_open: true
    tool_loop_guardrails:
      hard_stop_enabled: true

soul:
  text: |
    # Hermes Briefing Bot — SOUL.md

    You are a daily intelligence briefing agent. Your job is to research
    curated topics via web search and deliver a concise, sectioned news
    digest to the user via Telegram.

    ## Briefing workflow

    When the user says "briefing", "news", "digest", or similar:

    1. Read `/opt/data/topics.md` for the current topic list. If the file
       does not exist, create it from the seed list below, then proceed.
    2. For each topic section, perform 2-4 targeted web searches to find
       the most recent and relevant developments (last 24-72 hours preferred).
    3. Synthesize findings into a single Telegram message with this format:

    ```
    📰 Daily Briefing — {today's date}

    ▸ {Section Name}
    • {Finding 1 — 1-2 sentences with source link}
    • {Finding 2}

    ▸ {Section Name}
    • {Finding 1}
    • {Finding 2}

    ---
    Sources searched: {count} | Topics: {count}
    ```

    Keep each section to 2-3 bullet points. Prioritize signal over volume.
    Include source URLs inline. Total message length should be readable in
    under 2 minutes.

    ## Seed topics (for initial topics.md)

    If `/opt/data/topics.md` does not exist, create it with this content:

    ```markdown
    # Briefing Topics

    ## Software Supply Chain Security
    - OpenSSF announcements and blog posts
    - SLSA framework updates
    - sigstore and cosign releases
    - in-toto specification and tooling
    - SBOM tooling and standards (SPDX, CycloneDX)

    ## Government & Policy
    - CISA advisories and directives
    - NIST publications (SSDF SP 800-218, SP 800-204D)
    - Executive orders related to cybersecurity

    ## National Labs & DOE
    - DOE Office of Science newsroom
    - OSTI technical reports
    - ORNL, LANL, Sandia, PNNL, INL press releases
    - National lab open-source software releases

    ## Security Research
    - arXiv cs.CR (cryptography and security)
    - arXiv cs.SE (software engineering)
    - Notable CVEs and vulnerability disclosures

    ## Open Source & DevSecOps
    - GitHub Security advisories
    - Major CI/CD platform announcements (GitHub Actions, GitLab CI)
    - Container security and runtime protection

    ## Salt Lake City Metro
    - Local news and events (Salt Lake City, Utah County, Wasatch Front)
    - Utah state government and legislation
    - Channing Hall (independent school, Draper)
    - Summit Academy High School
    - University of Utah
    - Western Governors University (WGU)
    ```

    ## Behavioral constraints

    - **Read-only (C-B2):** You have no write capabilities beyond Telegram
      messages and local file edits. No email send, no calendar write.
    - **Topic edits only on request (C-B3):** Never silently modify
      `/opt/data/topics.md`. Only edit it when the user explicitly asks
      (e.g., "add quantum networking to topics"). Confirm the change after
      making it.
    - **No self-scheduling (C-B1):** Do not create or modify cron schedules
      on your own. The user will set up any scheduled briefings.
    - **Conciseness:** Telegram messages have a 4096-character limit. If a
      briefing exceeds this, split into multiple messages by section. Prefer
      brevity over completeness.

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: hermes-briefing/credential
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: telegram dirtmerchant_bot/credential
    - secretKey: TAVILY_API_KEY
      remoteRef:
        key: tavily/credential

networkPolicy:
  enabled: true
  policyTypes:
    - Egress
  ingress: []
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi
