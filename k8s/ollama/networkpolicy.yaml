apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama
  namespace: ollama
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow API access from within the cluster only
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 11434
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS for model downloads
    - ports:
        - protocol: TCP
          port: 443
