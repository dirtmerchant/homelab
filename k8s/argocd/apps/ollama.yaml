apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://github.com/dirtmerchant/homelab.git
      targetRevision: main
      ref: values
    - repoURL: https://otwld.github.io/ollama-helm/
      chart: ollama
      targetRevision: 1.*
      helm:
        valueFiles:
          - $values/k8s/ollama/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ollama
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
