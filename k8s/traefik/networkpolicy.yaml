apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: traefik
  namespace: traefik
spec:
  podSelector:
    matchLabels:
      app: traefik
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP, HTTPS, and ping/metrics from anywhere
    # Port 9000 exposes only /ping (health probes + monitoring)
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
  egress:
    # Unrestricted egress — Traefik must reach all backend services
    # across all namespaces.
    - {}
